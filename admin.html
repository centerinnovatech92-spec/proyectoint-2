<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administradores | InnovaTech Center</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- FontAwesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- CSS -->
<link rel="stylesheet" href="css/admn.css">
</head>
<body>

<!-- ================= NAVBAR ================= -->
<nav id="navbar">
  <div class="nav-container">
    <div class="nav-left">
      <!-- Hamburguesa -->
      <div id="hamburger"><span></span><span></span><span></span></div>

      <!-- Logo centrado -->
      <div class="nav-logo-container">
        <img src="img/A1.jpeg" alt="Logo InnovaTech" class="nav-logo-img">
      </div>
    </div>

    <!-- Información de usuario -->
    <div class="user-info" id="adminGreeting">Hola, Administrador</div>
  </div>

  <!-- Menú lateral -->
  <ul class="nav-links" id="nav-menu">
    <li><a href="index.html"><i class="fas fa-home"></i> Inicio</a></li>
  </ul>
</nav>

<!-- ================= DASHBOARD ================= -->
<section class="admin-dashboard">

  <!-- CLIENTES -->
  <div class="admin-section">
    <h2><i class="fas fa-users-cog"></i> Gestión de Clientes</h2>
    <button class="btn-icon" id="addClientBtn"><i class="fas fa-user-plus"></i> Agregar Cliente</button>
    <table class="admin-table">
      <thead>
        <tr><th>ID</th><th>Nombre</th><th>Correo</th><th>Acciones</th></tr>
      </thead>
      <tbody id="clientesTable"></tbody>
    </table>
  </div>

  <!-- SERVICIOS -->
  <div class="admin-section">
    <h2><i class="fas fa-cogs"></i> Gestión de Servicios</h2>
    <button class="btn-icon" id="addServiceModalBtn"><i class="fas fa-plus"></i> Agregar Servicio</button>
    <table class="admin-table">
      <thead>
        <tr><th>ID</th><th>Servicio</th><th>Acciones</th></tr>
      </thead>
      <tbody id="servicesTable"></tbody>
    </table>
  </div>

  <!-- GRÁFICAS -->
  <div class="admin-section">
    <h2><i class="fas fa-chart-line"></i> Estadísticas de Clientes</h2>
    <canvas id="clientesChart" height="150"></canvas>
  </div>

</section>

<!-- ================= MODALES ================= -->
<!-- Modal Cliente -->
<div id="modalAddClient" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2>Agregar Cliente</h2>
    <input type="text" id="clientNameInput" placeholder="Nombre completo">
    <input type="email" id="clientEmailInput" placeholder="Correo electrónico">
    <button class="btn-icon" id="saveClientBtn"><i class="fas fa-save"></i> Guardar Cliente</button>
  </div>
</div>

<!-- Modal Servicio -->
<div id="modalAddService" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2>Agregar Servicio</h2>
    <input type="text" id="serviceNameInput" placeholder="Nombre del servicio">
    <button class="btn-icon" id="saveServiceBtn"><i class="fas fa-save"></i> Guardar Servicio</button>
  </div>
</div>

<!-- ================= TOASTS ================= -->
<div id="toast" class="toast"></div>

<!-- ================= JS ================= -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
